{% extends "books/base.html" %}

{% block title %}
Home
{% endblock %}

{% block content %}
  <!-- cod html semantic -->

  <ul>
    {% for b in books %}
      <li>{{ b.title }} - {{ b.author }}
        <a href="{% url 'delete_book' b.pk %}" >🗑️</a>
        <a href="{% url 'update_book' b.pk %}" >✏️️</a>
      </li>
    {% endfor %}
  </ul>

{% endblock %}
